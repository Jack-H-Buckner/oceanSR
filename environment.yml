# Conda/mamba environment for OCEANSR (recommended path for the geospatial stack).
#   mamba env create -f environment.yml      # or: conda env create -f environment.yml
#   conda activate oceansr
name: oceansr
channels:
  - conda-forge
dependencies:
  - python=3.11
  - earthaccess>=0.11
  - earthengine-api
  - rioxarray>=0.15
  - rasterio>=1.3
  - xarray>=2024.1
  - netcdf4>=1.6
  - h5netcdf>=1.3     # read MUR NetCDF4/HDF5 over fsspec file objects
  - h5py>=3.10
  - shapely>=2.0
  - pyproj>=3.6
  - numpy>=1.24
  - pandas>=2.0
  - pyyaml>=6.0
  - dask            # chunked/lazy reads for the assembler
  - zarr            # per-AOI datacube store
  - herbie-data     # NOAA HRRR/RAP/etc. retrieval (met forcing)
  - cfgrib          # read GRIB2 (HRRR) into xarray
  - eccodes         # GRIB backend for cfgrib
  - pyresample      # regrid HRRR fields onto the AOI grid
  - dask            # handy for chunked reads later
  - pip             # keep pip available inside the env
